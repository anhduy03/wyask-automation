name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run tests
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: npx playwright test
      
      # - name: Load Allure history
      #   uses: actions/checkout@v4
      #   with:
      #     ref: gh-pages
      #     path: gh-pages

      # - name: Copy history
      #   run: |
      #       mkdir -p allure-results/history
      #       cp -r gh-pages/history allure-results/history || true
        
      - name: Install Java (Required for Allure)
        run: |
          apt-get update
          apt-get install -y default-jre

      - name: Generate Allure report
        run: npx allure generate ./allure-results --clean -o ./allure-report

      - name: Deploy Allure report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
    
      - name: Post link to Allure Report
        if: always()
        run: |
          echo "### 📊 Allure Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY