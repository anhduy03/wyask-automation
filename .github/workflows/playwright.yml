name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-pro:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run Pro plan tests
        env:
          PRO_EMAIL: ${{ secrets.PRO_EMAIL }}
          PRO_PASSWORD: ${{ secrets.PRO_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: npx playwright test --project=pro

      - name: Upload Pro auth state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pro-auth
          path: .auth/
          retention-days: 1

      - name: Upload Allure results (Pro)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-pro
          path: allure-results/
          retention-days: 5

  test-plus:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run Plus plan tests
        env:
          PLUS_EMAIL: ${{ secrets.PLUS_EMAIL }}
          PLUS_PASSWORD: ${{ secrets.PLUS_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: npx playwright test --project=plus

      - name: Upload Plus auth state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plus-auth
          path: .auth/
          retention-days: 1

      - name: Upload Allure results (Plus)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-plus
          path: allure-results/
          retention-days: 5

  report:
    runs-on: ubuntu-latest
    needs: [test-pro, test-plus]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Download Allure results (Pro)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-pro
          path: allure-results-pro

      - name: Download Allure results (Plus)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-plus
          path: allure-results-plus

      - name: Merge Allure results
        run: |
          mkdir -p allure-results
          cp -r allure-results-pro/* allure-results/ 2>/dev/null || true
          cp -r allure-results-plus/* allure-results/ 2>/dev/null || true

      - name: Install Java (Required for Allure)
        run: |
          apt-get update
          apt-get install -y default-jre

      - name: Generate Allure report
        run: npx allure generate ./allure-results --clean -o ./allure-report

      - name: Deploy Allure report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Post link to Allure Report
        if: always()
        run: |
          echo "### 📊 Allure Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
